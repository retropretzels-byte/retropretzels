html<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Retro Pretzels</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Yellowtail&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #131E29;
    --navy-deep: #0C141C;
    --teal: #3FD6D0;
    --pink: #FF6F91;
    --gold: #FFD873;
    --cream: #F4EFE6;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
  }

  body {
    background: radial-gradient(ellipse at center, var(--navy) 0%, var(--navy-deep) 100%);
    font-family: 'Poppins', sans-serif;
    color: var(--cream);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow-x: hidden;
    padding: 24px;
  }

  .bulb-row {
    display: flex;
    justify-content: center;
    gap: 22px;
    margin-bottom: 40px;
    flex-wrap: wrap;
  }

  .bulb {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--gold);
    animation: pulse 2.4s ease-in-out infinite;
  }

  .bulb:nth-child(odd) { animation-delay: 0.4s; }
  .bulb:nth-child(3n) { animation-delay: 0.8s; }

  @keyframes pulse {
    0%, 100% { opacity: 0.35; box-shadow: 0 0 4px var(--gold); }
    50% { opacity: 1; box-shadow: 0 0 14px var(--gold), 0 0 22px var(--gold); }
  }

  .wordmark {
    font-family: 'Yellowtail', cursive;
    font-size: clamp(3.2rem, 11vw, 6.5rem);
    color: var(--pink);
    text-shadow:
      0 0 6px rgba(255, 111, 145, 0.55),
      0 0 18px rgba(255, 111, 145, 0.45),
      0 0 40px rgba(255, 111, 145, 0.25);
    text-align: center;
    line-height: 1;
  }

  .tagline {
    margin-top: 18px;
    font-size: clamp(0.85rem, 2vw, 1.05rem);
    letter-spacing: 0.08em;
    color: var(--teal);
    font-weight: 400;
    font-style: italic;
    text-align: center;
    max-width: 32ch;
  }

  .order-btn {
    margin-top: 48px;
    display: inline-block;
    text-decoration: none;
    font-family: 'Poppins', sans-serif;
    font-weight: 700;
    font-size: 1.05rem;
    letter-spacing: 0.06em;
    color: var(--navy-deep);
    background: var(--gold);
    padding: 16px 44px;
    border-radius: 999px;
    box-shadow: 0 0 0 rgba(255, 216, 115, 0);
    transition: transform 0.2s ease, box-shadow 0.3s ease;
  }

  .order-btn:hover, .order-btn:focus-visible {
    transform: translateY(-2px) scale(1.03);
    box-shadow: 0 0 18px rgba(255, 216, 115, 0.6), 0 0 36px rgba(255, 216, 115, 0.35);
  }

  .order-btn:focus-visible {
    outline: 2px solid var(--cream);
    outline-offset: 3px;
  }

  @media (prefers-reduced-motion: reduce) {
    .bulb { animation: none; opacity: 0.9; }
    .order-btn { transition: none; }
  }

  footer {
    margin-top: 64px;
    font-size: 0.75rem;
    color: rgba(244, 239, 230, 0.4);
    letter-spacing: 0.05em;
    text-align: center;
  }
</style>
</head>
<body>

  <div class="bulb-row" aria-hidden="true">
    <div class="bulb"></div>
    <div class="bulb"></div>
    <div class="bulb"></div>
    <div class="bulb"></div>
    <div class="bulb"></div>
  </div>

  <h1 class="wordmark">Retro Pretzels</h1>
  <p class="tagline">A taste of Philly in the heart of Ventura</p>

  <a class="order-btn" href="#" id="orderLink">Order Now</a>

  <footer>Ventura, CA &middot; Home-baked, fresh</footer>

</body>
</html>
